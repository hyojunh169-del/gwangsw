<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>뚱냥이 키우기 극악 버전</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        /* * [CSS 스타일 및 레이아웃]
         * 고등학생 타겟에 맞춘 깔끔하고 트렌디한 카드형 레이아웃 및 뚱냥이 그림 중심 디자인입니다.
         */
        body {
            font-family: 'Pretendard', -apple-system, sans-serif;
            background-color: #f0f3f8;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: #333;
        }

        .container {
            width: 100%;
            max-width: 450px;
            background: #ffffff;
            border-radius: 24px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            padding: 24px;
            box-sizing: border-box;
            text-align: center;
        }

        h1 {
            color: #ff6b6b;
            font-size: 26px;
            margin-bottom: 8px;
        }

        .subtitle {
            font-size: 14px;
            color: #666;
            margin-bottom: 20px;
        }

        /* 안내 문구 영역 */
        .info-box {
            background-color: #fff5f5;
            border: 1px solid #ffe3e3;
            border-radius: 16px;
            padding: 14px;
            font-size: 13px;
            text-align: left;
            margin-bottom: 20px;
            line-height: 1.6;
        }
        .info-box ul {
            margin: 6px 0 0 0;
            padding-left: 20px;
        }
        .danger-text {
            color: #e63946;
            font-weight: bold;
        }
